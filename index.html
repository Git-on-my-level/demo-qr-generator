<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090f;
      --surface: #111118;
      --surface2: #191922;
      --border: #252535;
      --text: #e4e4ee;
      --text-dim: #6e6e88;
      --accent: #7c6cf0;
      --accent-glow: rgba(124, 108, 240, 0.2);
      --pink: #e879a8;
      --green: #4eeadb;
      --r: 8px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .blob {
      position: fixed;
      width: 340px; height: 340px;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.08;
      z-index: 0;
      animation: drift 30s ease-in-out infinite;
    }
    .blob-1 { background: var(--accent); top: -120px; left: -120px; }
    .blob-2 { background: var(--pink); bottom: -120px; right: -120px; animation-delay: -15s; }
    @keyframes drift {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(20px, 15px); }
    }

    .app {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      padding: 2rem 1.25rem 3rem;
    }

    /* ── Header ── */
    .hdr { text-align: center; margin-bottom: 1.25rem; }
    .hdr h1 {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--pink), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.02em;
    }
    .hdr p { color: var(--text-dim); font-size: 0.78rem; margin-top: 0.15rem; }

    /* ── Input card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 0.75rem;
    }

    textarea {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; line-height: 1.4;
      padding: 0.55rem 0.7rem;
      resize: none; min-height: 40px; max-height: 140px;
      outline: none; transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    textarea::placeholder { color: var(--text-dim); opacity: .5; }

    .presets { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.45rem; }
    .chip {
      padding: 0.2rem 0.55rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-dim);
      font-size: 0.68rem; font-family: inherit; cursor: pointer;
      transition: all .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); background: rgba(124,108,240,.08); }

    /* ── Options strip ── */
    .opts {
      display: flex; align-items: center; gap: 0.85rem;
      margin-top: 0.6rem; padding: 0.5rem 0.7rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); flex-wrap: wrap;
    }
    .o { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: var(--text-dim); }
    .o-l { font-weight: 600; text-transform: uppercase; letter-spacing: .04em; font-size: 0.6rem; }
    .o select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text);
      font-size: 0.72rem; padding: 0.2rem 0.3rem;
      outline: none; cursor: pointer; font-family: inherit;
    }
    .o select:focus { border-color: var(--accent); }

    input[type="range"] {
      -webkit-appearance: none; width: 70px; height: 3px;
      border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .sv { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--accent); min-width: 28px; }

    .sw {
      position: relative; width: 20px; height: 20px;
      border-radius: 4px; border: 1.5px solid var(--border);
      overflow: hidden; cursor: pointer; flex-shrink: 0;
    }
    .sw input[type="color"] {
      position: absolute; inset: -5px;
      width: calc(100% + 10px); height: calc(100% + 10px);
      border: none; cursor: pointer;
    }
    .ch { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--text-dim); }

    /* ── Generate button ── */
    .gen {
      width: 100%; margin-top: 0.6rem; padding: 0.6rem;
      background: linear-gradient(135deg, var(--accent), #8b6cf0);
      color: #fff; border: none; border-radius: var(--r);
      font-family: inherit; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all .2s; letter-spacing: .02em;
    }
    .gen:hover { transform: translateY(-1px); box-shadow: 0 6px 18px var(--accent-glow); }
    .gen:active { transform: translateY(0); }

    /* ── QR output ── */
    .out {
      display: none; flex-direction: column; align-items: center;
      gap: 0.85rem; margin-top: 1rem;
      animation: up .3s ease-out;
    }
    .out.show { display: flex; }
    @keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .frame {
      background: #fff; border-radius: 10px; padding: 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
      transition: transform .25s;
    }
    .frame:hover { transform: scale(1.03); }
    .frame canvas { display: block; border-radius: 3px; }

    .acts { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; }
    .ab {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.35rem 0.7rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .ab:hover { border-color: var(--accent); background: rgba(124,108,240,.08); }
    .ab svg { width: 12px; height: 12px; }

    .foot {
      text-align: center; margin-top: 1.5rem; padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      color: var(--text-dim); font-size: 0.68rem;
    }
    .foot a { color: var(--accent); text-decoration: none; }

    @media (max-width: 480px) {
      .app { padding: 1rem .75rem 2rem; }
      .opts { gap: 0.5rem; }
      input[type="range"] { width: 55px; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="app">
    <header class="hdr">
      <h1>QR Fun</h1>
      <p>Turn anything into a QR code</p>
    </header>

    <div class="card">
      <textarea id="input" placeholder="Paste a URL, type text, or pick a preset…" rows="1"></textarea>
      <div class="presets">
        <button class="chip" data-value="https://github.com/Git-on-my-level">GitHub</button>
        <button class="chip" data-value="WIFI:T:WPA;S:MyNetwork;P:password123;;">WiFi</button>
        <button class="chip" data-value="Hello from QR Fun! 🎉">Hello</button>
        <button class="chip" data-value="mailto:hello@example.com">Email</button>
      </div>
    </div>

    <div class="opts">
      <div class="o">
        <span class="o-l">Size</span>
        <input type="range" id="size" min="128" max="512" step="32" value="256">
        <span class="sv" id="size-val">256</span>
      </div>
      <div class="o">
        <span class="o-l">EC</span>
        <select id="ecl">
          <option value="L">L</option>
          <option value="M" selected>M</option>
          <option value="Q">Q</option>
          <option value="H">H</option>
        </select>
      </div>
      <div class="o">
        <span class="o-l">FG</span>
        <div class="sw"><input type="color" id="fg" value="#000000"></div>
        <span class="ch" id="fg-l">#000</span>
      </div>
      <div class="o">
        <span class="o-l">BG</span>
        <div class="sw"><input type="color" id="bg" value="#ffffff"></div>
        <span class="ch" id="bg-l">#fff</span>
      </div>
    </div>

    <button class="gen" id="go">Generate</button>

    <div class="out" id="out">
      <div class="frame"><canvas id="cv"></canvas></div>
      <div class="acts">
        <button class="ab" id="dl">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PNG
        </button>
        <button class="ab" id="csvg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          SVG
        </button>
        <button class="ab" id="cdu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
          Data URI
        </button>
      </div>
    </div>

    <div class="foot">
      <a href="https://github.com/nayuki/QR-Code-generator">nayuki</a> ·
      <a href="https://github.com/Git-on-my-level/demo-qr-generator">source</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const input = $('input'), sizeR = $('size'), sizeV = $('size-val');
    const ecl = $('ecl'), fg = $('fg'), bg = $('bg');
    const fgL = $('fg-l'), bgL = $('bg-l');
    const out = $('out'), cv = $('cv');

    sizeR.oninput = () => sizeV.textContent = sizeR.value;
    fg.oninput = () => fgL.textContent = fg.value;
    bg.oninput = () => bgL.textContent = bg.value;

    document.querySelectorAll('.chip').forEach(c => c.onclick = () => {
      input.value = c.dataset.value;
      input.focus();
      gen();
    });

    input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); gen(); } };
    $('go').onclick = gen;

    let svg = '';
    function gen() {
      const t = input.value.trim();
      if (!t) return input.focus();

      let qr;
      try { qr = qrcode(0, ecl.value); qr.addData(t); qr.make(); }
      catch { try { qr = qrcode(0, 'L'); qr.addData(t); qr.make(); }
        catch { return alert('Too long for a QR code.'); } }

      const s = +sizeR.value, n = qr.getModuleCount(), cs = s / n;
      cv.width = cv.height = s;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = bg.value; ctx.fillRect(0, 0, s, s);
      ctx.fillStyle = fg.value;
      for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) if (qr.isDark(r, c)) {
        const x = Math.round(c*cs), y = Math.round(r*cs);
        ctx.fillRect(x, y, Math.round((c+1)*cs)-x, Math.round((r+1)*cs)-y);
      }

      svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${s} ${s}" width="${s}" height="${s}"><rect width="${s}" height="${s}" fill="${bg.value}"/>`;
      for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) if (qr.isDark(r, c)) {
        const x = Math.round(c*cs), y = Math.round(r*cs);
        svg += `<rect x="${x}" y="${y}" width="${Math.round((c+1)*cs)-x}" height="${Math.round((r+1)*cs)-y}" fill="${fg.value}"/>`;
      }
      svg += '</svg>';
      out.classList.add('show');
    }

    $('dl').onclick = () => { const a = document.createElement('a'); a.download = 'qr.png'; a.href = cv.toDataURL('image/png'); a.click(); };

    function flash(id) { const b = $(id), h = b.innerHTML; b.textContent = '✓'; setTimeout(() => b.innerHTML = h, 1200); }
    async function clip(t, id) { try { await navigator.clipboard.writeText(t); } catch { const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } flash(id); }

    $('csvg').onclick = () => clip(svg, 'csvg');
    $('cdu').onclick = () => clip(cv.toDataURL('image/png'), 'cdu');
  </script>
</body>
</html>
